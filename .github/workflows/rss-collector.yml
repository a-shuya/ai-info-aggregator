name: RSS Data Collector

on:
  schedule:
    # 10分毎に実行 (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  collect-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # リポジトリへの書き込み権限を付与
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run RSS collector
      run: python rss_collector.py
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/tags/*.json data/articles_summary.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🤖 Update RSS data $(date '+%Y-%m-%d %H:%M UTC')"
          git push
          echo "Data updated and pushed - Vercel will auto-deploy"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}